<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tree of Life Explorer 🌳</title>
<meta name="description" content="Explore the tree of life as an interactive phylogenetic tree. Zoom, pan, and tap branches to discover how all animals are connected.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌳</text></svg>">
<style>
  html, body { margin: 0; background: #08191d; overflow: hidden; height: 100%; }
  #root { height: 100%; }
  .boot { color: #7fa7a1; font-family: system-ui, sans-serif; text-align: center; padding: 80px 16px; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="boot">Growing the tree of life…🌳</div></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

const L = (name, emoji, group) => ({ leaf: true, name, emoji, group });

const TREE = {
  common: "Animals with bodies", sci: "Eumetazoa", age: 700, children: [
    L("Jellyfish", "🪼", "Bugs & Others"),
    { common: "Two-sided animals", sci: "Bilateria", age: 680, children: [
      { common: "Mouth-first animals", sci: "Protostomia", age: 625, children: [
        { common: "Mollusks & worms", sci: "Lophotrochozoa", age: 610, children: [
          { common: "Mollusks", sci: "Mollusca", age: 550, children: [
            L("Octopus", "🐙", "Bugs & Others"), L("Snail", "🐌", "Bugs & Others") ] },
          L("Earthworm", "🪱", "Bugs & Others") ] },
        { common: "Molting animals", sci: "Ecdysozoa", age: 560, children: [
          L("Spider", "🕷️", "Bugs & Others"),
          { common: "Crustaceans & insects", sci: "Pancrustacea", age: 540, children: [
            L("Crab", "🦀", "Bugs & Others"),
            { common: "Metamorphosing insects", sci: "Endopterygota", age: 345, children: [
              L("Butterfly", "🦋", "Bugs & Others"),
              { common: "Bees & ants", sci: "Hymenoptera", age: 155, children: [
                L("Bee", "🐝", "Bugs & Others"), L("Ant", "🐜", "Bugs & Others") ] } ] } ] } ] } ] },
      { common: "Our branch (deuterostomes)", sci: "Deuterostomia", age: 600, children: [
        L("Starfish", "⭐", "Bugs & Others"),
        { common: "Jawed animals", sci: "Gnathostomata", age: 465, children: [
          L("Shark", "🦈", "Fish"),
          { common: "Bony animals", sci: "Osteichthyes", age: 435, children: [
            { common: "Ray-finned fish", sci: "Actinopterygii", age: 230, children: [
              L("Goldfish", "🐠", "Fish"), L("Salmon", "🐟", "Fish"), L("Pufferfish", "🐡", "Fish") ] },
            { common: "Four-limbed animals", sci: "Tetrapoda", age: 352, children: [
              { common: "Amphibians", sci: "Amphibia", age: 265, children: [
                L("Frog", "🐸", "Reptiles & Amphibians"), L("Salamander", "", "Reptiles & Amphibians") ] },
              { common: "Amniotes (shelled-egg animals)", sci: "Amniota", age: 319, children: [
                { common: "Mammals", sci: "Mammalia", age: 177, children: [
                  L("Platypus", "", "Mammals"),
                  { common: "Live-birth mammals", sci: "Theria", age: 159, children: [
                    { common: "Pouched mammals", sci: "Marsupialia", age: 64, children: [
                      L("Kangaroo", "🦘", "Mammals"), L("Koala", "🐨", "Mammals") ] },
                    { common: "Placental mammals", sci: "Placentalia", age: 99, children: [
                      L("Elephant", "🐘", "Mammals"),
                      { common: "Northern placentals", sci: "Boreoeutheria", age: 94, children: [
                        { common: "Primates, rodents & rabbits", sci: "Euarchontoglires", age: 87, children: [
                          { common: "Rodents & rabbits", sci: "Glires", age: 82, children: [
                            { common: "Rodents", sci: "Rodentia", age: 70, children: [
                              { common: "Mice & rats", sci: "Muroidea", age: 20, children: [
                                L("Mouse", "🐭", "Mammals"), L("Rat", "🐀", "Mammals") ] },
                              L("Squirrel", "🐿️", "Mammals") ] },
                            L("Rabbit", "🐰", "Mammals") ] },
                          { common: "Primates", sci: "Primates", age: 74, children: [
                            L("Lemur", "", "Mammals"),
                            { common: "Monkeys & apes", sci: "Catarrhini", age: 29, children: [
                              L("Monkey", "🐒", "Mammals"),
                              { common: "Great apes", sci: "Hominidae", age: 15.8, children: [
                                L("Orangutan", "🦧", "Mammals"),
                                { common: "African great apes", sci: "Homininae", age: 8.6, children: [
                                  L("Gorilla", "🦍", "Mammals"),
                                  { common: "Humans & chimps", sci: "Hominini", age: 6.4, children: [
                                    L("Human", "🧑", "Mammals"), L("Chimpanzee", "🐵", "Mammals") ] } ] } ] } ] } ] } ] },
                        { common: "Carnivores, hoofed mammals & bats", sci: "Laurasiatheria", age: 78, children: [
                          L("Bat", "🦇", "Mammals"),
                          { common: "Carnivores & hoofed mammals", sci: "Ferungulata", age: 77, children: [
                            { common: "Carnivorans", sci: "Carnivora", age: 54, children: [
                              { common: "Dog-like carnivores", sci: "Caniformia", age: 46, children: [
                                { common: "Dogs & foxes", sci: "Canidae", age: 10, children: [
                                  L("Dog", "🐕", "Mammals"), L("Fox", "🦊", "Mammals") ] },
                                { common: "Bears & seals", sci: "Arctoidea", age: 43, children: [
                                  { common: "Bears", sci: "Ursidae", age: 19, children: [
                                    L("Bear", "🐻", "Mammals"), L("Panda", "🐼", "Mammals") ] },
                                  L("Seal", "🦭", "Mammals") ] } ] },
                              { common: "Cats", sci: "Felidae", age: 10.8, children: [
                                L("Cat", "🐈", "Mammals"),
                                { common: "Big cats", sci: "Panthera", age: 3.9, children: [
                                  L("Lion", "🦁", "Mammals"), L("Tiger", "🐅", "Mammals") ] } ] } ] },
                            { common: "Hoofed mammals", sci: "Ungulata", age: 76, children: [
                              { common: "Horses", sci: "Equidae", age: 4, children: [
                                L("Horse", "🐎", "Mammals"), L("Zebra", "🦓", "Mammals") ] },
                              { common: "Even-toed hoofed mammals", sci: "Artiodactyla", age: 62, children: [
                                L("Pig", "🐖", "Mammals"),
                                { common: "Cattle, deer & whales", sci: "Cetruminantia", age: 56, children: [
                                  { common: "Ruminants", sci: "Pecora", age: 25, children: [
                                    L("Cow", "🐄", "Mammals"), L("Deer", "🦌", "Mammals"), L("Giraffe", "🦒", "Mammals") ] },
                                  { common: "Hippos & whales", sci: "Whippomorpha", age: 53, children: [
                                    L("Hippo", "🦛", "Mammals"),
                                    { common: "Whales & dolphins", sci: "Cetacea", age: 34, children: [
                                      L("Whale", "🐋", "Mammals"), L("Dolphin", "🐬", "Mammals") ] } ] } ] } ] } ] } ] } ] } ] } ] } ] } ] },
                { common: "Reptiles & birds", sci: "Sauropsida", age: 280, children: [
                  { common: "Lizards & snakes", sci: "Lepidosauria", age: 170, children: [
                    L("Lizard", "🦎", "Reptiles & Amphibians"), L("Snake", "🐍", "Reptiles & Amphibians") ] },
                  { common: "Turtles, crocs & birds", sci: "Archelosauria", age: 255, children: [
                    L("Turtle", "🐢", "Reptiles & Amphibians"),
                    { common: "Crocs & birds", sci: "Archosauria", age: 250, children: [
                      L("Crocodile", "🐊", "Reptiles & Amphibians"),
                      { common: "Birds", sci: "Aves", age: 110, children: [
                        L("Ostrich", "", "Birds"),
                        { common: "Modern birds", sci: "Neognathae", age: 100, children: [
                          { common: "Fowl", sci: "Galloanserae", age: 65, children: [
                            L("Chicken", "🐔", "Birds"), L("Duck", "🦆", "Birds") ] },
                          { common: "Land & water birds", sci: "Neoaves", age: 68, children: [
                            L("Eagle", "🦅", "Birds"), L("Owl", "🦉", "Birds"),
                            L("Parrot", "🦜", "Birds"), L("Penguin", "🐧", "Birds"),
                            L("Sparrow", "🐦", "Birds") ] } ] } ] } ] } ] } ] } ] } ] } ] } ] } ] } ] }
  ]
};

const C = {
  bg: "#08191d", panel: "#0e2b31", panel2: "#0c2429", line: "#5fb6a8",
  accent: "#f2a65a", accent2: "#bfe89c", ink: "#eaf4ef", sub: "#7fa7a1",
  chip: "#123339", chipOn: "#1c545d", border: "#1d4750",
};

const GROUP_COLORS = {
  "Mammals":              "#f2a65a",
  "Birds":                "#bfe89c",
  "Reptiles & Amphibians":"#7ecfc0",
  "Fish":                 "#6fb5e0",
  "Bugs & Others":        "#d4a0d9",
};

const ROW_H = 32;
const NODE_R = 5;
const LEAF_PAD = 160;
const MAX_AGE = 720;

let _id = 0;
(function tag(node, parent) {
  node.__id = _id++; node.__parent = parent;
  if (node.children) node.children.forEach((c) => tag(c, node));
})(TREE, null);

function countLeaves(n) {
  if (n.leaf) return 1;
  return n.children.reduce((s, c) => s + countLeaves(c), 0);
}

function layoutTree(root, collapsed) {
  const nodes = [];
  const links = [];
  let leafIdx = 0;

  function walk(node, depth) {
    if (node.leaf) {
      const y = leafIdx * ROW_H;
      leafIdx++;
      nodes.push({ ...node, x: 0, y, depth });
      return y;
    }

    const isCollapsed = collapsed.has(node.__id);
    const nLeaves = countLeaves(node);
    const x = (node.age / MAX_AGE) * 1;

    if (isCollapsed) {
      const yCenter = leafIdx * ROW_H + ((nLeaves - 1) * ROW_H) / 2;
      leafIdx += nLeaves;
      nodes.push({ ...node, x, y: yCenter, depth, isCollapsed: true, leafCount: nLeaves });
      return yCenter;
    }

    const childYs = node.children.map((c) => walk(c, depth + 1));
    const yMin = Math.min(...childYs);
    const yMax = Math.max(...childYs);
    const yMid = (yMin + yMax) / 2;

    nodes.push({ ...node, x, y: yMid, depth });

    node.children.forEach((c, i) => {
      const cx = c.leaf ? 0 : (c.age / MAX_AGE);
      links.push({
        parentX: x, parentY: yMid,
        childX: cx, childY: childYs[i],
        group: c.group || (c.children ? null : null),
      });
    });

    return yMid;
  }

  walk(root, 0);
  return { nodes, links, totalLeaves: leafIdx };
}

function ageMa(a) {
  return (a >= 10 ? Math.round(a) : Math.round(a * 10) / 10) + " Ma";
}

function TreeOfLifeExplorer() {
  const [collapsed, setCollapsed] = useState(new Set());
  const [hover, setHover] = useState(null);
  const [search, setSearch] = useState("");
  const [highlighted, setHighlighted] = useState(new Set());
  const svgRef = useRef(null);
  const containerRef = useRef(null);

  const [pan, setPan] = useState({ x: 60, y: 20 });
  const [zoom, setZoom] = useState(1);
  const dragging = useRef(false);
  const lastMouse = useRef({ x: 0, y: 0 });

  const layout = useMemo(() => layoutTree(TREE, collapsed), [collapsed]);
  const treeW = 900;
  const treeH = layout.totalLeaves * ROW_H;

  const toggleCollapse = useCallback((id) => {
    setCollapsed((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }, []);

  useEffect(() => {
    if (!search.trim()) { setHighlighted(new Set()); return; }
    const q = search.toLowerCase();
    const hits = new Set();
    function walk(n) {
      if (n.leaf) {
        if (n.name.toLowerCase().includes(q)) hits.add(n.__id);
      } else {
        if (n.common.toLowerCase().includes(q) || n.sci.toLowerCase().includes(q)) hits.add(n.__id);
        n.children.forEach(walk);
      }
    }
    walk(TREE);
    setHighlighted(hits);
  }, [search]);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    const rect = containerRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    const newZoom = Math.max(0.15, Math.min(5, zoom * factor));
    const ratio = newZoom / zoom;
    setPan((p) => ({
      x: mx - ratio * (mx - p.x),
      y: my - ratio * (my - p.y),
    }));
    setZoom(newZoom);
  }, [zoom]);

  const handleMouseDown = useCallback((e) => {
    if (e.button !== 0) return;
    dragging.current = true;
    lastMouse.current = { x: e.clientX, y: e.clientY };
  }, []);

  const handleMouseMove = useCallback((e) => {
    if (!dragging.current) return;
    const dx = e.clientX - lastMouse.current.x;
    const dy = e.clientY - lastMouse.current.y;
    lastMouse.current = { x: e.clientX, y: e.clientY };
    setPan((p) => ({ x: p.x + dx, y: p.y + dy }));
  }, []);

  const handleMouseUp = useCallback(() => { dragging.current = false; }, []);

  const handleTouchStart = useCallback((e) => {
    if (e.touches.length === 1) {
      dragging.current = true;
      lastMouse.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, []);
  const handleTouchMove = useCallback((e) => {
    if (!dragging.current || e.touches.length !== 1) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - lastMouse.current.x;
    const dy = e.touches[0].clientY - lastMouse.current.y;
    lastMouse.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    setPan((p) => ({ x: p.x + dx, y: p.y + dy }));
  }, []);
  const handleTouchEnd = useCallback(() => { dragging.current = false; }, []);

  const scaleX = (frac) => treeW - frac * (treeW - LEAF_PAD);

  const timeMarkers = [0, 50, 100, 200, 300, 400, 500, 600, 700];

  const resetView = () => { setPan({ x: 60, y: 20 }); setZoom(1); };
  const zoomIn = () => {
    const rect = containerRef.current.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const factor = 1.3;
    const newZoom = Math.min(5, zoom * factor);
    const ratio = newZoom / zoom;
    setPan((p) => ({ x: cx - ratio * (cx - p.x), y: cy - ratio * (cy - p.y) }));
    setZoom(newZoom);
  };
  const zoomOut = () => {
    const rect = containerRef.current.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const factor = 1 / 1.3;
    const newZoom = Math.max(0.15, zoom * factor);
    const ratio = newZoom / zoom;
    setPan((p) => ({ x: cx - ratio * (cx - p.x), y: cy - ratio * (cy - p.y) }));
    setZoom(newZoom);
  };

  const collapseAll = () => {
    const ids = new Set();
    function walk(n) { if (!n.leaf) { ids.add(n.__id); n.children.forEach(walk); } }
    TREE.children.forEach(walk);
    setCollapsed(ids);
  };
  const expandAll = () => setCollapsed(new Set());

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column",
      background: C.bg, color: C.ink, fontFamily: "'Nunito',sans-serif", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');
        .disp{font-family:'Baloo 2',cursive;}
        .mono{font-family:'Space Mono',monospace;}
        .tbtn{cursor:pointer;background:${C.chip};border:1px solid ${C.border};color:${C.ink};
          border-radius:8px;padding:6px 12px;font-weight:700;font-size:13px;font-family:inherit;
          transition:all .12s;}
        .tbtn:hover{background:${C.chipOn};border-color:${C.line};}
        .tbtn.active{background:${C.chipOn};border-color:${C.accent};}
        * { box-sizing: border-box; }
      `}</style>

      {/* header bar */}
      <div style={{ padding: "12px 16px", background: C.panel, borderBottom: `1px solid ${C.border}`,
        display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", flex: "none" }}>
        <div style={{ flex: "1 1 200px", minWidth: 0 }}>
          <h1 className="disp" style={{ fontSize: 22, margin: 0, whiteSpace: "nowrap" }}>
            🌳 Tree of Life Explorer
          </h1>
          <p style={{ margin: "2px 0 0", color: C.sub, fontSize: 12 }}>
            Drag to pan · Scroll to zoom · Tap branches to expand or collapse
          </p>
        </div>
        <input value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="Search animals or groups…"
          style={{ width: 220, background: C.panel2, border: `1px solid ${C.border}`,
            borderRadius: 8, padding: "7px 12px", color: C.ink, fontSize: 13,
            outline: "none", fontFamily: "inherit" }} />
        <div style={{ display: "flex", gap: 6 }}>
          <button className="tbtn" onClick={zoomIn} title="Zoom in">+</button>
          <button className="tbtn" onClick={zoomOut} title="Zoom out">−</button>
          <button className="tbtn" onClick={resetView} title="Reset view">⟲</button>
          <button className="tbtn" onClick={expandAll} title="Expand all">▼</button>
          <button className="tbtn" onClick={collapseAll} title="Collapse all">▶</button>
        </div>
      </div>

      {/* legend */}
      <div style={{ padding: "6px 16px", background: C.panel2, borderBottom: `1px solid ${C.border}`,
        display: "flex", gap: 14, flexWrap: "wrap", alignItems: "center", flex: "none" }}>
        <span style={{ fontSize: 11, color: C.sub, fontWeight: 700 }}>GROUPS:</span>
        {Object.entries(GROUP_COLORS).map(([g, col]) => (
          <span key={g} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: col, display: "inline-block" }} />
            <span style={{ color: C.sub }}>{g}</span>
          </span>
        ))}
      </div>

      {/* tree canvas */}
      <div ref={containerRef}
        style={{ flex: 1, overflow: "hidden", cursor: dragging.current ? "grabbing" : "grab", position: "relative" }}
        onWheel={handleWheel}
        onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp}
        onMouseLeave={handleMouseUp}
        onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>

        <svg ref={svgRef} width="100%" height="100%"
          style={{ position: "absolute", top: 0, left: 0 }}>
          <g transform={`translate(${pan.x}, ${pan.y}) scale(${zoom})`}>

            {/* time axis */}
            {timeMarkers.map((ma) => {
              const x = scaleX(ma / MAX_AGE);
              return (
                <g key={ma}>
                  <line x1={x} y1={-20} x2={x} y2={treeH + 10}
                    stroke={C.border} strokeWidth={ma === 0 ? 1.5 : 0.5}
                    strokeDasharray={ma === 0 ? "none" : "4 6"} />
                  <text x={x} y={-26} textAnchor="middle" fontSize="9"
                    fill={C.sub} fontFamily="'Space Mono',monospace">
                    {ma === 0 ? "Today" : `${ma} Ma`}
                  </text>
                </g>
              );
            })}

            {/* links (elbow connectors) */}
            {layout.links.map((lk, i) => {
              const px = scaleX(lk.parentX);
              const cx = scaleX(lk.childX);
              return (
                <path key={i}
                  d={`M${px},${lk.parentY} H${px} V${lk.childY} H${cx}`}
                  fill="none" stroke={C.line} strokeWidth={1.2} strokeOpacity={0.5} />
              );
            })}

            {/* nodes */}
            {layout.nodes.map((nd) => {
              const x = scaleX(nd.x);
              const isHit = highlighted.size > 0 && highlighted.has(nd.__id);
              const isDim = highlighted.size > 0 && !isHit;

              if (nd.leaf) {
                const col = GROUP_COLORS[nd.group] || C.ink;
                return (
                  <g key={nd.__id} opacity={isDim ? 0.25 : 1}
                    style={{ transition: "opacity .2s" }}>
                    <circle cx={x} cy={nd.y} r={NODE_R} fill={col}
                      stroke={isHit ? "#fff" : "none"} strokeWidth={isHit ? 2 : 0} />
                    <text x={x + 10} y={nd.y + 1} dominantBaseline="middle"
                      fontSize="13" fill={C.ink} fontFamily="'Nunito',sans-serif" fontWeight="700">
                      {nd.emoji ? `${nd.emoji} ` : ""}{nd.name}
                    </text>
                  </g>
                );
              }

              if (nd.isCollapsed) {
                return (
                  <g key={nd.__id} style={{ cursor: "pointer", transition: "opacity .2s" }}
                    opacity={isDim ? 0.25 : 1}
                    onClick={() => toggleCollapse(nd.__id)}
                    onMouseEnter={() => setHover(nd)} onMouseLeave={() => setHover(null)}>
                    <polygon
                      points={`${x},${nd.y - 8} ${x + 14},${nd.y} ${x},${nd.y + 8}`}
                      fill={C.accent} fillOpacity={0.7} stroke={C.accent} strokeWidth={1} />
                    <text x={x + 20} y={nd.y + 1} dominantBaseline="middle"
                      fontSize="11" fill={C.accent} fontWeight="700"
                      fontFamily="'Nunito',sans-serif">
                      {nd.common} ({nd.leafCount})
                    </text>
                    <text x={x + 20} y={nd.y + 14} dominantBaseline="middle"
                      fontSize="9" fill={C.sub} fontStyle="italic"
                      fontFamily="'Space Mono',monospace">
                      {nd.sci} · {ageMa(nd.age)}
                    </text>
                  </g>
                );
              }

              return (
                <g key={nd.__id} style={{ cursor: "pointer", transition: "opacity .2s" }}
                  opacity={isDim ? 0.25 : 1}
                  onClick={() => toggleCollapse(nd.__id)}
                  onMouseEnter={() => setHover(nd)} onMouseLeave={() => setHover(null)}>
                  <circle cx={x} cy={nd.y} r={NODE_R + 1} fill={C.line}
                    stroke={isHit ? "#fff" : C.bg} strokeWidth={isHit ? 2.5 : 1.5} />
                  <text x={x} y={nd.y - 10} textAnchor="middle"
                    fontSize="9.5" fill={C.sub} fontWeight="700"
                    fontFamily="'Nunito',sans-serif">
                    {nd.common}
                  </text>
                </g>
              );
            })}
          </g>
        </svg>

        {/* hover tooltip */}
        {hover && !hover.leaf && (
          <div style={{ position: "absolute", top: 10, right: 10, width: 260,
            background: C.panel, border: `1px solid ${C.border}`, borderRadius: 14,
            padding: "14px 16px", pointerEvents: "none", zIndex: 10 }}>
            <div className="disp" style={{ fontSize: 17, marginBottom: 4, color: C.accent2 }}>
              {hover.common}
            </div>
            <div className="mono" style={{ fontSize: 11, color: C.sub, marginBottom: 8 }}>
              {hover.sci}
            </div>
            <div style={{ fontSize: 13, color: C.ink, marginBottom: 4 }}>
              Split from relatives about <b style={{ color: C.accent }}>{ageMa(hover.age)}</b> ago
            </div>
            <div style={{ fontSize: 12, color: C.sub }}>
              {countLeaves(hover)} species in this group
            </div>
            <div style={{ marginTop: 8, fontSize: 11, color: C.sub, borderTop: `1px solid ${C.border}`,
              paddingTop: 8 }}>
              Click to {collapsed.has(hover.__id) ? "expand" : "collapse"}
            </div>
          </div>
        )}
      </div>

      {/* footer */}
      <div style={{ padding: "8px 16px", background: C.panel2, borderTop: `1px solid ${C.border}`,
        display: "flex", justifyContent: "space-between", alignItems: "center", flex: "none" }}>
        <span style={{ fontSize: 11, color: C.sub }}>
          Split times are approximate (TimeTree-style). Recent splits are firm; deep ones are debated.
        </span>
        <span className="mono" style={{ fontSize: 11, color: C.sub }}>
          {layout.totalLeaves} species · zoom {Math.round(zoom * 100)}%
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TreeOfLifeExplorer />);
</script>
</body>
</html>
